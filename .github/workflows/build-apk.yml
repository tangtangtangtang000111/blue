name: Build APK

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Qt 5.15.2 for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtconnectivity'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-31" "build-tools;31.0.0" "ndk;21.4.7075529" > /dev/null 2>&1

      - name: Build
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/21.4.7075529
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-31 \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake
          cmake --build build --parallel

      - name: Generate APK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/21.4.7075529
          androiddeployqt \
            --input build/android-BluetoothCar-deployment-settings.json \
            --output build/android-build \
            --android-platform android-31 \
            --gradle

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BluetoothCar-APK
          path: build/android-build/build/outputs/apk/debug/*.apk
