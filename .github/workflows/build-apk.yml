name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Qt 6.5.3 (host + Android)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtconnectivity'
          setup-python: 'true'

      - name: Setup Android SDK + NDK
        run: |
          SDKDIR=$HOME/android-sdk
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/tools.zip
          mkdir -p $SDKDIR/cmdline-tools/latest
          cd $SDKDIR/cmdline-tools/latest
          unzip -q /tmp/tools.zip
          if [ -d cmdline-tools ]; then mv cmdline-tools/* . 2>/dev/null; rmdir cmdline-tools; fi
          yes | ./bin/sdkmanager --sdk_root=$SDKDIR --licenses > /dev/null 2>&1 || true
          ./bin/sdkmanager --sdk_root=$SDKDIR "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"
          echo "ANDROID_SDK_ROOT=$SDKDIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$SDKDIR/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake
          cmake --build build --parallel

      - name: Generate APK
        run: |
          androiddeployqt \
            --input build/android-BluetoothCar-deployment-settings.json \
            --output build/android-build \
            --android-platform android-33 \
            --gradle

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BluetoothCar-APK
          path: build/android-build/build/outputs/apk/debug/*.apk
