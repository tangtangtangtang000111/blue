name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Qt 5.15.2 for Android
        run: |
          pip3 install aqtinstall
          python3 -m aqt install-qt linux android 5.15.2 android_arm64_v8a -O $HOME/Qt
          echo "QT_INSTALL_DIR=$HOME/Qt/5.15.2" >> $GITHUB_ENV

      - name: Setup Android SDK
        run: |
          SDKDIR=$HOME/android-sdk
          mkdir -p $SDKDIR/cmdline-tools
          cd $SDKDIR/cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -q tools.zip
          mkdir -p latest
          mv cmdline-tools/* latest/ 2>/dev/null || true
          yes | $SDKDIR/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $SDKDIR/cmdline-tools/latest/bin/sdkmanager "platforms;android-31" "build-tools;31.0.0" "ndk;21.4.7075529" > /dev/null 2>&1
          echo "ANDROID_SDK_ROOT=$SDKDIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$SDKDIR/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Build with CMake
        run: |
          export CMAKE_PREFIX_PATH=$HOME/Qt/5.15.2/android_arm64_v8a
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-31 \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake
          cmake --build build --parallel

      - name: Generate APK
        run: |
          export QT_ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT
          export QT_ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT
          $HOME/Qt/5.15.2/android_arm64_v8a/bin/androiddeployqt \
            --input build/android-BluetoothCar-deployment-settings.json \
            --output build/android-build \
            --android-platform android-31 \
            --gradle

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BluetoothCar-APK
          path: build/android-build/build/outputs/apk/debug/*.apk
